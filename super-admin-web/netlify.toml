[build]
  command = "npm run build"
  publish = "dist"

# Tighten CSP `connect-src` to your API origin after verifying in browser devtools (replace api host below).
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), interest-cohort=()"
    Cross-Origin-Opener-Policy = "same-origin"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Content-Security-Policy-Report-Only = "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self' https://api.elevatewebandmarketing.com https: http://localhost:*; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; object-src 'none'"
